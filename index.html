<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computer Engineering - Nattapong</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-color: #262335;
        --card-bg: #241b2f;
        --neon-pink: #ff7edb;
        --neon-cyan: #36f9f6;
        --text-main: #ffffff;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: var(--bg-color);
        background-image: 
            linear-gradient(rgba(38, 35, 53, 0.9), rgba(38, 35, 53, 0.9)),
            repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(54, 249, 246, 0.03) 40px, rgba(54, 249, 246, 0.03) 41px),
            repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(54, 249, 246, 0.03) 40px, rgba(54, 249, 246, 0.03) 41px);
        font-family: 'Inter', sans-serif;
        color: var(--text-main);
    }

    .card {
        background: var(--card-bg);
        padding: 50px 40px 40px 40px;
        width: 340px;
        border-radius: 12px;
        text-align: center;
        position: relative;
        box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        border: 1px solid rgba(255, 255, 255, 0.05);
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 
            0 15px 35px rgba(0,0,0,0.6),
            0 0 20px rgba(255, 126, 219, 0.15);
    }

    .terminal-header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 30px;
        background: rgba(0,0,0,0.4);
        display: flex;
        align-items: center;
        padding: 0 15px;
        gap: 6px;
    }

    .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
    }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }

    .avatar {
        width: 90px;
        height: 90px;
        margin: 10px auto 20px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--neon-pink), var(--neon-cyan));
        color: var(--card-bg);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 36px;
        font-weight: 800;
        box-shadow: 0 0 20px rgba(255, 126, 219, 0.4);
        border: 4px solid var(--card-bg);
    }

    h1 {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
    }

    p {
        font-family: 'Fira Code', monospace;
        color: var(--neon-cyan);
        font-size: 14px;
        background: rgba(54, 249, 246, 0.1);
        display: inline-block;
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid rgba(54, 249, 246, 0.2);
    }

    .badges {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 18px;
    }

    .badge {
        font-family: 'Fira Code', monospace;
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 4px;
        background: rgba(255, 126, 219, 0.1);
        color: var(--neon-pink);
        border: 1px solid rgba(255, 126, 219, 0.2);
    }

    a {
        display: inline-block;
        margin-top: 30px;
        padding: 12px 24px;
        text-decoration: none;
        color: var(--text-main);
        background: transparent;
        border: 2px solid var(--neon-cyan);
        border-radius: 8px;
        font-family: 'Fira Code', monospace;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        z-index: 1;
        width: 100%;
    }

    a::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 0%;
        height: 100%;
        background: var(--neon-cyan);
        transition: all 0.3s ease;
        z-index: -1;
    }

    a:hover {
        color: var(--card-bg);
        box-shadow: 0 0 15px rgba(54, 249, 246, 0.4);
    }

    a:hover::before {
        width: 100%;
    }
</style>

</head>
<body>

<div class="card">
    <div class="terminal-header">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
    </div>

    <div class="avatar">N</div>
    
    <h1>Nattapong Sangsana</h1>
    <p>664110310060</p>

    <div class="badges">
        <span class="badge">Linux</span>
        <span class="badge">C++</span>
        <span class="badge">Rust</span>
        <span class="badge">Network</span>
    </div>

    <a href="https://github.com/nattapong18-en" target="_blank">
        ~/github_profile
    </a>
</div>

</body>
</html>
