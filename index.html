<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#f5f5f5;
    }

    .card{
        background:#fff;
        padding:40px;
        width:340px;
        border-radius:16px;
        text-align:center;
        box-shadow:0 10px 25px rgba(0,0,0,.08);
    }

    .avatar{
        width:90px;
        height:90px;
        margin:auto;
        border-radius:50%;
        background:#111;
        color:#fff;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:32px;
        font-weight:bold;
        margin-bottom:20px;
    }

    h1{
        font-size:28px;
        color:#222;
    }

    p{
        margin-top:8px;
        color:#666;
        font-size:16px;
    }

    a{
        display:inline-block;
        margin-top:28px;
        padding:12px 24px;
        text-decoration:none;
        color:#fff;
        background:#111;
        border-radius:8px;
        transition:.3s;
    }

    a:hover{
        background:#333;
        transform:translateY(-2px);
    }
</style>

</head>
<body>

<div class="card">

    <div class="avatar">S</div>

    <h1>Nattapong sangsana</h1>

    <p>664110310060</p>

    <a href="https://github.com/nattapong18-en" target="_blank">
        GitHub Profile
    </a>

</div>

</body>
</html>
