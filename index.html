<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nattapong - Software Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-color: #f9fafb;
        --card-bg: #ffffff;
        --text-main: #111827;
        --text-muted: #6b7280;
        --border-color: #e5e7eb;
        --badge-bg: #f3f4f6;
        --primary: #111111;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: var(--bg-color);
        /* ลายตารางบางๆ ให้ดูเป็นงานคราฟต์ของ Dev */
        background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
        background-size: 24px 24px;
        font-family: 'Inter', sans-serif;
        color: var(--text-main);
    }

    .card {
        background: var(--card-bg);
        padding: 48px 40px;
        width: 380px;
        border-radius: 16px;
        text-align: center;
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
    }

    img.avatar {
        width: 100px;
        height: 100px;
        margin: 0 auto 20px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid var(--border-color);
        display: block;
        padding: 4px;
        background: var(--card-bg);
    }

    h1 {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
        color: var(--text-main);
    }

    .bio {
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1.6;
        margin-bottom: 24px;
    }

    .id-section {
        margin-bottom: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
    }

    .id-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .student-id {
        font-family: 'Fira Code', monospace;
        color: var(--text-main);
        font-size: 13px;
        font-weight: 500;
        background: var(--bg-color);
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid var(--border-color);
    }

    .badges {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 32px;
    }

    .badge {
        font-size: 12px;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: 99px;
        background: var(--badge-bg);
        color: var(--text-main);
        border: 1px solid var(--border-color);
        transition: background 0.2s;
    }

    .badge:hover {
        background: #e5e7eb;
    }

    a {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        text-decoration: none;
        color: #ffffff;
        background: var(--primary);
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
        width: 100%;
        border: 1px solid transparent;
    }

    a:hover {
        background: #333333;
        transform: translateY(-1px);
    }
    
    /* ไอคอน GitHub แบบเรียบง่าย */
    .github-icon {
        width: 18px;
        height: 18px;
        fill: currentColor;
    }

</style>

</head>
<body>

<div class="card">
    <img src="https://github.com/nattapong18-en.png" alt="Profile Avatar" class="avatar">
    
    <h1>Nattapong Sangsana</h1>
    
    <div class="bio">
        Computer Engineering student specializing in low-level systems, networks, and kernel engineering.
    </div>

    <div class="id-section">
        <span class="id-label">Student ID</span>
        <div class="student-id">664110310060</div>
    </div>

    <div class="badges">
        <span class="badge">Linux</span>
        <span class="badge">C++</span>
        <span class="badge">Rust</span>
        <span class="badge">Network</span>
    </div>

</div>

</body>
</html>
